name: packages

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  deb:
    name: build-deb
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr
      - name: Build
        run: cmake --build build --parallel
      - name: Package .deb
        working-directory: build
        run: cpack -G DEB
      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: build/*.deb

  rpm:
    name: build-rpm
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: dnf install -y cmake gcc rpm-build
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr
      - name: Build
        run: cmake --build build --parallel
      - name: Package .rpm
        working-directory: build
        run: cpack -G RPM
      - name: Upload .rpm
        uses: actions/upload-artifact@v4
        with:
          name: rpm-package
          path: build/*.rpm

  release-packages:
    name: attach-to-release
    needs: [deb, rpm]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
